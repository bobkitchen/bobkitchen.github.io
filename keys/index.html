<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keys</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9375rem;
      color: #666;
      margin-bottom: 40px;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-link {
      display: block;
      padding: 20px 24px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      text-decoration: none;
      color: #1a1a1a;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      text-align: left;
    }

    .tool-link:hover {
      border-color: #999;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .tool-link:active {
      transform: scale(0.99);
    }

    .tool-name {
      font-size: 1.0625rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 0.8125rem;
      color: #666;
    }

    .tool-arrow {
      float: right;
      color: #999;
      font-size: 1.25rem;
      margin-top: 4px;
    }

    .home {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.8125rem;
      color: #888;
      text-decoration: none;
    }

    .home:hover {
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Keys</h1>
    <p class="subtitle">Credential manager for macOS &amp; iOS</p>
    <div class="tools">
      <a href="./privacy.html" class="tool-link">
        <span class="tool-arrow">&rarr;</span>
        <div class="tool-name">Privacy Policy</div>
        <div class="tool-desc">How Keys handles your data &mdash; in plain English</div>
      </a>
    </div>
    <a href="/" class="home">&larr; Bob Kitchen</a>
  </div>
</body>
</html>
